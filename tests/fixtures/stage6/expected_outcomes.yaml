# ===== SCORE BUCKET / MONOTONICITY =====
score_bucket_tests:
  - fixture_id: "SCORE-80PLUS"
    score: 88.0
    expected_bucket: "80_PLUS"
  - fixture_id: "SCORE-60-79"
    score: 68.0
    expected_bucket: "60_79"
  - fixture_id: "SCORE-40-59"
    score: 52.0
    expected_bucket: "40_59"
  - fixture_id: "SCORE-LT40"
    score: 32.0
    expected_bucket: "LT_40"

# ===== FAILURE REASON ENUM =====
failure_reason_enum:
  - mapping_wrong
  - timing_wrong
  - market_rejected
  - source_bad
  - risk_too_strict
  - risk_too_loose
  - provider_bad
  - market_data_bad
  - score_not_predictive
  - gate_rule_wrong
  - execution_missing
  - join_key_missing
  - benchmark_missing
  - insufficient_sample

# ===== STATS INCLUSION RULES =====
primary_stats_rules:
  valid: "included"
  degraded: "excluded"
  invalid: "excluded"
  pending: "excluded"
  pending_confirm: "excluded"
  unknown: "excluded"
  mock_test: "excluded"
  benchmark_missing: "excluded_from_alpha_primary"
